services:
  db:
    image: mysql:8.0
    container_name: payroll_db
    restart: always
    environment:
      MYSQL_DATABASE: payroll
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
    command: --log-bin-trust-function-creators=1
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./db:/docker-entrypoint-initdb.d  

  phpmyadmin:
    image: phpmyadmin
    container_name: phpmyadmin_gui
    restart: always
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: 
    depends_on:
      - db

volumes:
  db_data:

